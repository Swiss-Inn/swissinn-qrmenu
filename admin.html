<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiss Inn – Mini Bar Yönetim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Playfair+Display+SC:wght@700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #141210;
  --surface: #1e1b17;
  --card:    #252118;
  --border:  #3a3228;
  --border2: #4e4438;
  --gold:    #c9a84c;
  --gold2:   #8a6e35;
  --red:     #c0392b;
  --green:   #27ae60;
  --text:    #e8dcc8;
  --text2:   #a89878;
  --text3:   #6b5a3e;
  --accent:  #c9a84c;

  --f-xs: clamp(10px, 2.2vw, 12px);
  --f-sm: clamp(12px, 2.8vw, 14px);
  --f-md: clamp(14px, 3.2vw, 16px);
  --f-lg: clamp(18px, 4vw,  22px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'Jost', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ── Top bar ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 clamp(16px, 4vw, 32px);
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo-badge {
  width: 34px; height: 34px;
  background: #8c1a1a; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-badge svg { width: 20px; height: 20px; }
.topbar-title {
  font-family: 'Playfair Display SC', serif;
  font-size: var(--f-md); font-weight: 700;
  color: var(--text); letter-spacing: .5px;
}
.topbar-sub {
  font-size: var(--f-xs); color: var(--text2);
  letter-spacing: 1.5px; text-transform: uppercase;
  display: block; margin-top: 1px;
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  flex-shrink: 0;
}
.status-dot.err { background: var(--red); box-shadow: 0 0 6px var(--red); }
.status-label { font-size: var(--f-xs); color: var(--text2); letter-spacing: 1px; }

/* ── Layout ── */
.main {
  max-width: 960px; margin: 0 auto;
  padding: clamp(20px,4vw,36px) clamp(12px,3vw,24px) 60px;
  display: grid;
  grid-template-columns: 1fr;
  gap: clamp(18px, 3vw, 28px);
}

@media (min-width: 768px) {
  .main { grid-template-columns: 1fr 340px; }
  .col-items { grid-column: 1; }
  .col-add   { grid-column: 2; grid-row: 1 / 3; }
}

/* ── Section başlık ── */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: clamp(10px, 2vw, 16px);
}
.section-title {
  font-family: 'Playfair Display SC', serif;
  font-size: var(--f-sm); font-weight: 700;
  color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase;
}
.section-count {
  font-size: var(--f-xs); color: var(--text3);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 10px;
}

/* ── Ürün kartları ── */
.item-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: clamp(10px,2.5vw,16px);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px 12px;
  align-items: start;
  transition: border-color .18s;
}
.item-card:hover { border-color: var(--border2); }
.item-card + .item-card { margin-top: 8px; }

.item-card-name {
  font-family: 'Playfair Display', serif;
  font-size: var(--f-md); font-weight: 600; color: var(--text);
  line-height: 1.3;
}
.item-card-key {
  display: inline-block;
  font-size: 10px; font-weight: 500; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 7px; margin-top: 4px;
}
.item-card-langs {
  font-size: var(--f-xs); color: var(--text2);
  margin-top: 4px; line-height: 1.6;
}
.item-card-langs span { color: var(--text3); margin-right: 4px; }

/* Fiyat input satır içi */
.item-card-price-row {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 8px; margin-top: 4px;
}
.price-label {
  font-size: var(--f-xs); color: var(--text3);
  text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;
}
.price-input {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 4px; color: var(--text);
  font-family: 'Playfair Display', serif; font-size: var(--f-md);
  padding: 5px 10px; width: 110px; text-align: right; outline: none;
  transition: border-color .15s;
}
.price-input:focus { border-color: var(--gold); }
.price-input::placeholder { color: var(--text3); font-family: 'Jost',sans-serif; font-size: 11px; }
.price-tl-badge {
  font-size: var(--f-xs); color: var(--text2);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; padding: 4px 7px;
}
.save-price-btn {
  margin-left: auto;
  font-family: 'Jost',sans-serif; font-size: var(--f-xs); font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 6px 14px;
  background: transparent; border: 1px solid var(--gold2);
  border-radius: 4px; color: var(--gold); cursor: pointer;
  transition: all .18s; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.save-price-btn:hover { background: var(--gold2); color: var(--bg); }
.save-price-btn.saving { opacity: .5; pointer-events: none; }

/* Sil butonu */
.item-card-actions { display: flex; gap: 6px; }
.del-btn {
  width: 30px; height: 30px; border-radius: 4px;
  background: transparent; border: 1px solid var(--border2);
  color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all .18s; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.del-btn:hover { background: rgba(192,57,43,.18); border-color: var(--red); color: var(--red); }

/* inline bildirim */
.inline-ok { font-size: 10px; color: var(--green); margin-left: 6px; opacity: 0; transition: opacity .2s; }
.inline-ok.show { opacity: 1; }

/* ── Yeni ürün formu ── */
.add-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: clamp(14px,3vw,20px);
  position: sticky; top: 76px;
}
.add-card-title {
  font-family: 'Playfair Display SC', serif;
  font-size: var(--f-sm); font-weight: 700; color: var(--gold);
  letter-spacing: 1.5px; margin-bottom: clamp(12px,2.5vw,18px);
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.form-group { margin-bottom: 10px; }
.form-label {
  display: block; font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 5px;
}
.form-label .lang-tag {
  display: inline-block; font-size: 9px; letter-spacing: 1px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 5px; color: var(--gold2); margin-left: 5px;
}
.form-input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 4px;
  color: var(--text); font-family: 'Jost',sans-serif; font-size: var(--f-sm);
  padding: 7px 10px; outline: none; transition: border-color .15s;
}
.form-input:focus { border-color: var(--gold); }
.form-input::placeholder { color: var(--text3); font-size: 11px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-divider { height: 1px; background: var(--border); margin: 14px 0; }

.add-btn {
  width: 100%; margin-top: 14px;
  font-family: 'Jost',sans-serif; font-size: var(--f-xs); font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  padding: clamp(10px,2.5vw,13px);
  background: var(--gold2); color: var(--bg);
  border: none; border-radius: 4px; cursor: pointer;
  transition: background .18s; -webkit-tap-highlight-color: transparent;
}
.add-btn:hover { background: var(--gold); }
.add-btn:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

.form-feedback {
  text-align: center; font-size: var(--f-xs); margin-top: 8px;
  letter-spacing: 1px; min-height: 18px;
}
.form-feedback.ok  { color: var(--green); }
.form-feedback.err { color: var(--red); }

/* ── Toplu kaydet ── */
.bulk-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  flex-wrap: wrap;
}
.bulk-info { font-size: var(--f-xs); color: var(--text2); }
.bulk-btn {
  font-family: 'Jost',sans-serif; font-size: var(--f-xs); font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 8px 20px;
  background: var(--bg); border: 1px solid var(--gold2);
  border-radius: 4px; color: var(--gold); cursor: pointer;
  transition: all .18s; -webkit-tap-highlight-color: transparent;
}
.bulk-btn:hover { background: var(--gold2); color: var(--bg); }
.bulk-btn:disabled { opacity: .4; cursor: not-allowed; }
.bulk-ok { font-size: var(--f-xs); color: var(--green); letter-spacing: 1px; opacity: 0; transition: opacity .3s; }
.bulk-ok.show { opacity: 1; }

/* ── Skeleton loader ── */
.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%);
  background-size: 200% 100%; border-radius: 4px;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Toast ── */
.toast-wrap { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
.toast {
  font-family: 'Jost',sans-serif; font-size: var(--f-xs);
  padding: 10px 18px; border-radius: 5px;
  border-left: 3px solid; box-shadow: 0 4px 20px rgba(0,0,0,.5);
  transform: translateX(120%); transition: transform .28s ease;
  max-width: 300px;
}
.toast.ok  { background: #152214; border-color: var(--green); color: #a3e4b0; }
.toast.err { background: #200e0e; border-color: var(--red);   color: #f5a5a0; }
.toast.show { transform: translateX(0); }

@media (max-width: 480px) {
  .toast-wrap { bottom: 12px; right: 12px; left: 12px; }
  .toast { max-width: 100%; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-badge">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="23" fill="#8c1a1a"/>
        <path d="M7 18 Q12 8 22 6 Q26 5 28 8 L28 28 Q20 24 12 28 Q8 24 7 18Z" fill="white"/>
        <path d="M49 38 Q44 48 34 50 Q30 51 28 48 L28 28 Q36 32 44 28 Q48 32 49 38Z" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="topbar-title">Mini Bar Yönetimi</div>
      <span class="topbar-sub">Swiss Inn · Mardin</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">Bağlanıyor…</span>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Sol: Ürün listesi -->
  <div class="col-items">

    <!-- Toplu fiyat kaydet bar -->
    <div class="bulk-bar" style="margin-bottom: clamp(12px,2.5vw,18px);">
      <div>
        <div class="bulk-info">Fiyat değişikliklerini toplu kaydet</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="bulk-ok" id="bulk-ok">✓ Kaydedildi</span>
        <button class="bulk-btn" id="bulk-btn" onclick="saveAllPrices()">Tümünü Kaydet</button>
      </div>
    </div>

    <div class="section-head">
      <div class="section-title">Ürünler</div>
      <div class="section-count" id="item-count">—</div>
    </div>

    <div id="items-list">
      <!-- skeleton -->
      <div style="display:flex;flex-direction:column;gap:8px">
        <div class="skeleton" style="height:90px"></div>
        <div class="skeleton" style="height:90px"></div>
        <div class="skeleton" style="height:90px"></div>
      </div>
    </div>

  </div><!-- col-items -->

  <!-- Sağ: Yeni ürün ekle -->
  <div class="col-add">
    <div class="add-card">
      <div class="add-card-title">Yeni Ürün Ekle</div>

      <div class="form-group">
        <label class="form-label">Anahtar <span class="lang-tag">KEY</span></label>
        <input class="form-input" id="f-key" placeholder="örn: cay, kahve…" maxlength="20">
      </div>

      <div class="form-group">
        <label class="form-label">Türkçe İsim <span class="lang-tag">TR</span></label>
        <input class="form-input" id="f-tr" placeholder="Çay">
      </div>
      <div class="form-group">
        <label class="form-label">İngilizce İsim <span class="lang-tag">EN</span></label>
        <input class="form-input" id="f-en" placeholder="Tea">
      </div>
      <div class="form-group">
        <label class="form-label">Arapça İsim <span class="lang-tag">AR</span></label>
        <input class="form-input" id="f-ar" placeholder="شاي" style="direction:rtl">
      </div>

      <div class="form-divider"></div>

      <div class="form-group">
        <label class="form-label">TR Alt Metin <span class="lang-tag" style="color:var(--text3)">OPSİYONEL</span></label>
        <input class="form-input" id="f-trsub" placeholder="Resepsiyondan talep ediniz">
      </div>
      <div class="form-group">
        <label class="form-label">EN Alt Metin <span class="lang-tag" style="color:var(--text3)">OPSİYONEL</span></label>
        <input class="form-input" id="f-ensub" placeholder="Request from reception">
      </div>
      <div class="form-group">
        <label class="form-label">AR Alt Metin <span class="lang-tag" style="color:var(--text3)">OPSİYONEL</span></label>
        <input class="form-input" id="f-arsub" placeholder="اطلب من الاستقبال" style="direction:rtl">
      </div>

      <div class="form-divider"></div>

      <div class="form-group">
        <label class="form-label">Başlangıç Fiyatı <span class="lang-tag" style="color:var(--text3)">OPSİYONEL</span></label>
        <input class="form-input" id="f-price" type="number" min="0" step="1" placeholder="₺" style="text-align:right">
      </div>

      <button class="add-btn" id="add-btn" onclick="addItem()">+ Ürün Ekle</button>
      <div class="form-feedback" id="form-feedback"></div>
    </div>
  </div>

</div><!-- main -->

<!-- Toast container -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
const SB_URL = 'https://blwqssdudrrqgnfqposw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsd3Fzc2R1ZHJycWduZnFwb3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTg1NjcsImV4cCI6MjA5MTMzNDU2N30.EgpT-Es41_5XpyX46fmkJkZLZ8xTl18APCltIjvFGWI';
const SB_HDR = {
  'apikey': SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type': 'application/json'
};

let items  = [];
let prices = {};

/* ── Bağlantı durumu ── */
function setStatus(ok) {
  document.getElementById('status-dot').className   = 'status-dot' + (ok ? '' : ' err');
  document.getElementById('status-label').textContent = ok ? 'Bağlı' : 'Bağlantı Hatası';
}

/* ── Toast ── */
function toast(msg, type = 'ok') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add('show'); }); });
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 320); }, 2800);
}

/* ── Veri yükle ── */
async function init() {
  try {
    const [iRes, pRes] = await Promise.all([
      fetch(`${SB_URL}/rest/v1/minibar_items?select=*&order=sort_order.asc`, { headers: SB_HDR }),
      fetch(`${SB_URL}/rest/v1/prices?select=key,price`, { headers: SB_HDR })
    ]);

    if (!iRes.ok) throw new Error('items fetch failed');
    items  = await iRes.json();
    const pd = await pRes.json();
    prices = {};
    pd.forEach(r => { prices[r.key] = r.price; });
    setStatus(true);
  } catch(e) {
    console.error(e);
    setStatus(false);
    // Supabase tablosu yoksa demo verisini yükle
    items = DEMO_ITEMS;
    toast('minibar_items tablosu bulunamadı — demo modda çalışıyor', 'err');
  }
  renderList();
}

const DEMO_ITEMS = [
  {id:1, key:'coca',   tr:'Coca-Cola',          en:'Coca-Cola',         ar:'كوكا كولا',    sort_order:0},
  {id:2, key:'fanta',  tr:'Fanta',              en:'Fanta',             ar:'فانتا',         sort_order:1},
  {id:3, key:'sprite', tr:'Sprite',             en:'Sprite',            ar:'سبرايت',        sort_order:2},
  {id:4, key:'meyveK', tr:'Meyve Suyu Karışık', en:'Mixed Fruit Juice', ar:'عصير فواكه مشكل',sort_order:3},
  {id:5, key:'meyveV', tr:'Meyve Suyu Vişne',   en:'Sour Cherry Juice', ar:'عصير كرز حامض', sort_order:4},
  {id:6, key:'enerji', tr:'Enerji İçeceği',     en:'Energy Drink',      ar:'مشروب طاقة',    sort_order:5},
  {id:7, key:'ciko',   tr:'Çikolata',           en:'Chocolate',         ar:'شوكولاتة',       sort_order:6},
  {id:8, key:'cerez',  tr:'Karışık Çerez',      en:'Mixed Nuts',        ar:'مكسرات مشكلة',  sort_order:7},
  {id:9, key:'sodaS',  tr:'Soda Sade',          en:'Plain Soda',        ar:'صودا سادة',      sort_order:8},
  {id:10,key:'sodaM',  tr:'Soda Meyveli',       en:'Fruity Soda',       ar:'صودا بالفاكهة', sort_order:9},
  {id:11,key:'meyveT', tr:'Meyve Tabağı',       en:'Fruit Plate',       ar:'طبق فواكه',
   trSub:'Resepsiyondan talep ediniz', enSub:'Request from reception', arSub:'اطلب من الاستقبال', sort_order:10}
];

/* ── Listeyi render et ── */
function renderList() {
  const wrap = document.getElementById('items-list');
  document.getElementById('item-count').textContent = items.length + ' ürün';
  wrap.innerHTML = '';

  if (!items.length) {
    wrap.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px;font-style:italic">Henüz ürün eklenmedi</div>';
    return;
  }

  items.forEach(item => {
    const p   = prices[item.key];
    const has = p !== null && p !== undefined && p !== '';
    const card = document.createElement('div');
    card.className = 'item-card';
    card.dataset.key = item.key;

    card.innerHTML = `
      <div>
        <div class="item-card-name">${escHtml(item.tr)}</div>
        <div class="item-card-key">${escHtml(item.key)}</div>
        <div class="item-card-langs">
          <span>EN</span>${escHtml(item.en || '—')} &nbsp;
          <span>AR</span>${escHtml(item.ar || '—')}
          ${item.trSub ? `<br><span style="font-size:10px;color:var(--text3)">↳ ${escHtml(item.trSub)}</span>` : ''}
        </div>
      </div>
      <div class="item-card-actions">
        <button class="del-btn" title="Sil" onclick="deleteItem('${escHtml(item.key)}', ${item.id || 0})">✕</button>
      </div>
      <div class="item-card-price-row">
        <span class="price-label">Fiyat</span>
        <input class="price-input" type="number" min="0" step="1"
               data-key="${escHtml(item.key)}"
               value="${has ? parseFloat(p) : ''}"
               placeholder="0">
        <span class="price-tl-badge">₺</span>
        <button class="save-price-btn" onclick="saveSinglePrice('${escHtml(item.key)}', this)">Kaydet</button>
        <span class="inline-ok" id="ok-${escHtml(item.key)}">✓</span>
      </div>
    `;
    wrap.appendChild(card);
  });
}

/* ── Tek fiyat kaydet ── */
async function saveSinglePrice(key, btn) {
  const inp   = btn.closest('.item-card-price-row').querySelector('.price-input');
  const ok    = document.getElementById('ok-' + key);
  const v     = inp.value.trim();
  const price = v === '' || isNaN(parseFloat(v)) ? null : parseFloat(v);

  btn.classList.add('saving');
  btn.textContent = '…';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/prices?key=eq.${key}`, {
      method: 'PATCH',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ price })
    });
    if (!res.ok) throw new Error();
    prices[key] = price;
    ok.classList.add('show');
    setTimeout(() => ok.classList.remove('show'), 2000);
  } catch(e) {
    toast('Fiyat kaydedilemedi: ' + key, 'err');
  }
  btn.classList.remove('saving');
  btn.textContent = 'Kaydet';
}

/* ── Tüm fiyatları toplu kaydet ── */
async function saveAllPrices() {
  const btn  = document.getElementById('bulk-btn');
  const okEl = document.getElementById('bulk-ok');
  btn.disabled = true; btn.textContent = 'Kaydediliyor…';

  const inputs = document.querySelectorAll('.price-input');
  const updates = [];
  inputs.forEach(inp => {
    const v     = inp.value.trim();
    const price = v === '' || isNaN(parseFloat(v)) ? null : parseFloat(v);
    prices[inp.dataset.key] = price;
    updates.push({ key: inp.dataset.key, price });
  });

  try {
    await Promise.all(updates.map(({ key, price }) =>
      fetch(`${SB_URL}/rest/v1/prices?key=eq.${key}`, {
        method: 'PATCH',
        headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ price })
      })
    ));
    okEl.classList.add('show');
    setTimeout(() => okEl.classList.remove('show'), 2500);
    toast(`${updates.length} ürün fiyatı güncellendi`);
  } catch(e) {
    toast('Toplu kayıt başarısız', 'err');
  }
  btn.disabled = false; btn.textContent = 'Tümünü Kaydet';
}

/* ── Ürün ekle ── */
async function addItem() {
  const btn = document.getElementById('add-btn');
  const fb  = document.getElementById('form-feedback');
  const key = document.getElementById('f-key').value.trim().toLowerCase().replace(/\s+/g, '_');
  const tr  = document.getElementById('f-tr').value.trim();
  const en  = document.getElementById('f-en').value.trim();
  const ar  = document.getElementById('f-ar').value.trim();
  const trSub = document.getElementById('f-trsub').value.trim() || null;
  const enSub = document.getElementById('f-ensub').value.trim() || null;
  const arSub = document.getElementById('f-arsub').value.trim() || null;
  const priceRaw = document.getElementById('f-price').value.trim();
  const price    = priceRaw && !isNaN(parseFloat(priceRaw)) ? parseFloat(priceRaw) : null;

  fb.className = 'form-feedback';
  if (!key || !tr || !en || !ar) { fb.className = 'form-feedback err'; fb.textContent = 'Key, TR, EN ve AR alanları zorunlu'; return; }
  if (items.some(i => i.key === key)) { fb.className = 'form-feedback err'; fb.textContent = '"' + key + '" anahtarı zaten mevcut'; return; }

  btn.disabled = true; btn.textContent = 'Ekleniyor…';
  try {
    const sort_order = items.length ? Math.max(...items.map(i => i.sort_order || 0)) + 1 : 0;
    const newItem = { key, tr, en, ar, trSub, enSub, arSub, sort_order };

    const iRes = await fetch(`${SB_URL}/rest/v1/minibar_items`, {
      method: 'POST',
      headers: { ...SB_HDR, 'Prefer': 'return=representation' },
      body: JSON.stringify(newItem)
    });
    if (!iRes.ok) throw new Error(await iRes.text());
    const [saved] = await iRes.json();
    items.push(saved);

    // Fiyat satırı da oluştur
    if (price !== null) {
      await fetch(`${SB_URL}/rest/v1/prices`, {
        method: 'POST',
        headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ key, price })
      });
      prices[key] = price;
    }

    renderList();
    ['f-key','f-tr','f-en','f-ar','f-trsub','f-ensub','f-arsub','f-price'].forEach(id => { document.getElementById(id).value = ''; });
    fb.className = 'form-feedback ok'; fb.textContent = '✓ "' + tr + '" eklendi';
    toast('"' + tr + '" başarıyla eklendi');
    setTimeout(() => { fb.textContent = ''; }, 3000);
  } catch(e) {
    console.error(e);
    fb.className = 'form-feedback err'; fb.textContent = 'Hata: ' + (e.message || 'Bilinmeyen hata');
    toast('Ürün eklenemedi', 'err');
  }
  btn.disabled = false; btn.textContent = '+ Ürün Ekle';
}

/* ── Ürün sil ── */
async function deleteItem(key, id) {
  if (!confirm(`"${key}" ürününü silmek istediğinize emin misiniz?`)) return;
  try {
    // minibar_items sil
    if (id) {
      const r = await fetch(`${SB_URL}/rest/v1/minibar_items?id=eq.${id}`, {
        method: 'DELETE', headers: SB_HDR
      });
      if (!r.ok) throw new Error();
    }
    // prices sil
    await fetch(`${SB_URL}/rest/v1/prices?key=eq.${key}`, {
      method: 'DELETE', headers: SB_HDR
    });

    items = items.filter(i => i.key !== key);
    delete prices[key];
    renderList();
    toast('"' + key + '" silindi');
  } catch(e) {
    toast('Silme başarısız', 'err');
  }
}

/* ── Yardımcı ── */
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
